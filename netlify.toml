[build]
command = "npm --prefix frontend install && npm --prefix frontend run build"
publish = "frontend/dist"

[build.environment]
VITE_API_BASE_URL = "/api/v1"

[[redirects]]
from = "/api/*"
to = "https://fleet-backend.onrender.com/api/:splat"
status = 200
force = true

[[redirects]]
from = "/assets/*"
to = "/assets/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
