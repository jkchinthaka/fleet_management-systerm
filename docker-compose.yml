services:
  mongodb:
    image: mongo:7
    container_name: fleet-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleet-backend
    environment:
      NODE_ENV: production
      PORT: 4000
      API_PREFIX: /api/v1
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-Fleet_New}
      JWT_SECRET: ${JWT_SECRET:-local_dev_jwt_secret_please_override_123}
      JWT_EXPIRES_IN: 8h
      LOG_LEVEL: info
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "4000:4000"
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fleet-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
